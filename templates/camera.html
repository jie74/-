<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>远程摄像头 - 手机端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: #0a0b14;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .status-bar .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            transition: background 0.3s;
        }

        .status-dot.connected {
            background: #00e676;
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.5);
            animation: dotPulse 2s ease-in-out infinite;
        }

        .status-dot.streaming {
            background: #ff5252;
            box-shadow: 0 0 10px rgba(255, 82, 82, 0.5);
            animation: dotPulse 1s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }

        .fps-badge {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(124, 92, 255, 0.2);
            color: #a78bfa;
            border: 1px solid rgba(124, 92, 255, 0.3);
        }

        /* 视频容器 */
        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        #localVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 叠加层 - 未开始时 */
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 11, 20, 0.9);
            backdrop-filter: blur(20px);
            z-index: 5;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .overlay .icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .overlay h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .overlay p {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
        }

        /* 底部控制栏 */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-top: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .btn {
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c5cff, #5b3cc4);
            color: white;
            box-shadow: 0 4px 20px rgba(124, 92, 255, 0.4);
        }

        .btn-primary:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(124, 92, 255, 0.6);
        }

        .btn-primary:active { transform: scale(0.95); }

        .btn-primary.active {
            background: linear-gradient(135deg, #ff5252, #d32f2f);
            box-shadow: 0 4px 20px rgba(255, 82, 82, 0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: #e0e0e0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.05);
        }

        .btn-small {
            width: 48px;
            height: 48px;
            font-size: 1.2rem;
        }

        /* 名称输入框 */
        .name-input {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 12px 20px;
            color: #e0e0e0;
            font-size: 1rem;
            width: 250px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 20px;
        }

        .name-input:focus {
            border-color: rgba(124, 92, 255, 0.6);
        }

        .name-input::placeholder { color: rgba(255,255,255,0.3); }

        /* Toast 通知 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #e0e0e0;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* 质量选择 */
        .quality-select {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 6px 12px;
            color: #e0e0e0;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }

        .quality-select option { background: #1a1c3a; }
    </style>
</head>
<body>
    <!-- 顶部状态栏 -->
    <div class="status-bar">
        <div class="left">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">未连接</span>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <select class="quality-select" id="qualitySelect">
                <option value="0.6">标清</option>
                <option value="0.75" selected>高清</option>
                <option value="0.9">超清</option>
            </select>
            <span class="fps-badge" id="fpsBadge">0 FPS</span>
        </div>
    </div>

    <!-- 视频区域 -->
    <div class="video-container">
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="overlay" id="overlay">
            <div class="icon">📱</div>
            <h2>手机摄像头</h2>
            <p>输入名称后点击下方按钮开始</p>
            <input type="text" class="name-input" id="cameraName" placeholder="输入摄像头名称..." value="我的手机">
        </div>
    </div>

    <!-- 底部控制栏 -->
    <div class="controls">
        <button class="btn btn-secondary btn-small" id="switchBtn" title="切换摄像头">🔄</button>
        <button class="btn btn-primary" id="startBtn" title="开始/停止">📷</button>
        <button class="btn btn-secondary btn-small" id="flashBtn" title="闪光灯">💡</button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // ========== 状态管理 ==========
        const state = {
            streaming: false,
            facingMode: 'environment', // 默认后置
            stream: null,
            socket: null,
            frameInterval: null,
            frameCount: 0,
            quality: 0.75,
        };

        // ========== DOM 元素 ==========
        const video = document.getElementById('localVideo');
        const startBtn = document.getElementById('startBtn');
        const switchBtn = document.getElementById('switchBtn');
        const flashBtn = document.getElementById('flashBtn');
        const overlay = document.getElementById('overlay');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const fpsBadge = document.getElementById('fpsBadge');
        const toast = document.getElementById('toast');
        const qualitySelect = document.getElementById('qualitySelect');
        const cameraNameInput = document.getElementById('cameraName');

        // ========== Canvas (用于帧捕获) ==========
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        // ========== Socket.IO 连接 ==========
        function connectSocket() {
            // 连接到当前服务器
            state.socket = io(window.location.origin, {
                transports: ['websocket', 'polling']
            });

            state.socket.on('connect', () => {
                statusDot.className = 'status-dot connected';
                statusText.textContent = '已连接服务器';
                showToast('✅ 已连接到服务器');
            });

            state.socket.on('disconnect', () => {
                statusDot.className = 'status-dot';
                statusText.textContent = '连接断开';
                showToast('❌ 服务器连接断开');
            });

            state.socket.on('connect_error', (err) => {
                statusDot.className = 'status-dot';
                statusText.textContent = '连接失败';
                showToast('⚠️ 连接失败: ' + err.message);
            });
        }

        // ========== 摄像头操作 ==========
        async function startCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: state.facingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };

                state.stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = state.stream;

                // 等视频加载好后设置 canvas 尺寸
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                };

                return true;
            } catch (err) {
                showToast('❌ 无法访问摄像头: ' + err.message);
                console.error('Camera error:', err);
                return false;
            }
        }

        function stopCamera() {
            if (state.stream) {
                state.stream.getTracks().forEach(track => track.stop());
                state.stream = null;
                video.srcObject = null;
            }
        }

        // ========== 帧传输 ==========
        function startStreaming() {
            if (!state.socket || !state.stream) return;

            const cameraName = cameraNameInput.value || '未命名摄像头';
            state.socket.emit('register_camera', { name: cameraName });

            state.frameCount = 0;
            let lastFpsUpdate = Date.now();

            // 根据质量确定发送间隔 (约 15fps)
            state.frameInterval = setInterval(() => {
                if (video.readyState >= 2) {
                    // 绘制到canvas
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // 转为 JPEG base64
                    const dataUrl = canvas.toDataURL('image/jpeg', state.quality);

                    // 发送帧
                    state.socket.emit('video_frame', {
                        image: dataUrl,
                        timestamp: Date.now()
                    });

                    // 计算 FPS
                    state.frameCount++;
                    const now = Date.now();
                    if (now - lastFpsUpdate >= 1000) {
                        fpsBadge.textContent = state.frameCount + ' FPS';
                        state.frameCount = 0;
                        lastFpsUpdate = now;
                    }
                }
            }, 66); // ~15fps

            state.streaming = true;
            statusDot.className = 'status-dot streaming';
            statusText.textContent = '正在推流...';
        }

        function stopStreaming() {
            if (state.frameInterval) {
                clearInterval(state.frameInterval);
                state.frameInterval = null;
            }
            state.streaming = false;
            fpsBadge.textContent = '0 FPS';
            statusDot.className = 'status-dot connected';
            statusText.textContent = '已停止推流';
        }

        // ========== 事件绑定 ==========
        startBtn.addEventListener('click', async () => {
            if (!state.streaming) {
                const success = await startCamera();
                if (success) {
                    overlay.classList.add('hidden');
                    startBtn.classList.add('active');
                    startBtn.textContent = '⏹';
                    startStreaming();
                    showToast('🎥 开始推流');
                }
            } else {
                stopStreaming();
                stopCamera();
                overlay.classList.remove('hidden');
                startBtn.classList.remove('active');
                startBtn.textContent = '📷';
                showToast('⏹ 已停止');
            }
        });

        switchBtn.addEventListener('click', async () => {
            state.facingMode = state.facingMode === 'environment' ? 'user' : 'environment';
            if (state.streaming) {
                stopStreaming();
                stopCamera();
                const success = await startCamera();
                if (success) startStreaming();
            }
            showToast('🔄 切换到' + (state.facingMode === 'environment' ? '后置' : '前置') + '摄像头');
        });

        flashBtn.addEventListener('click', async () => {
            if (!state.stream) return;
            const track = state.stream.getVideoTracks()[0];
            try {
                const capabilities = track.getCapabilities();
                if (capabilities.torch) {
                    const settings = track.getSettings();
                    await track.applyConstraints({
                        advanced: [{ torch: !settings.torch }]
                    });
                    showToast(settings.torch ? '💡 闪光灯已关闭' : '💡 闪光灯已开启');
                } else {
                    showToast('⚠️ 此设备不支持闪光灯');
                }
            } catch (e) {
                showToast('⚠️ 闪光灯控制不可用');
            }
        });

        qualitySelect.addEventListener('change', () => {
            state.quality = parseFloat(qualitySelect.value);
            showToast('📊 画质已调整');
        });

        // ========== 工具函数 ==========
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ========== 初始化 ==========
        connectSocket();
    </script>
</body>
</html>
